server:
  port: 8080

spring:
  application:
    name: secure-ecommerce

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: email, profile
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  access-token-expiry: 900000        # 15 minutes in ms
  refresh-token-expiry: 604800000    # 7 days in ms
  remember-me-expiry: 2592000000     # 30 days in ms
  issuer: secure-ecommerce

# Security Settings
app:
  security:
    max-failed-attempts: 5
    lock-duration-minutes: 30
    password-reset-expiry-hours: 24
    cors:
      allowed-origins:
        - http://localhost:3000
        - http://localhost:4200
      allowed-methods: GET, POST, PUT, DELETE, PATCH, OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600
    rate-limit:
      login-attempts: 10
      login-window-seconds: 60
      api-requests-per-minute: 100

# Resilience4j Rate Limiting
resilience4j:
  ratelimiter:
    instances:
      loginEndpoint:
        limitForPeriod: 10
        limitRefreshPeriod: 60s
        timeoutDuration: 0s
      apiEndpoint:
        limitForPeriod: 100
        limitRefreshPeriod: 60s
        timeoutDuration: 0s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, security-metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
